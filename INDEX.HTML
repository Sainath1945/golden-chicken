<!DOCTYPE html>
<html>
<head>
  <title>Golden Chicken</title>
  <style>
    body { font-family: Arial; text-align:center; background:#f5f5f5; }
    .card { background:#fff; margin:15px; padding:20px; width:220px; display:inline-block; border-radius:10px; }
    .price { color:green; font-size:20px; }
  </style>
</head>
<body>

<h2>Golden Chicken</h2>
<div id="productContainer"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAS4JupEabUBhu2IPOvYJ2MupB4Fl6M0vc",
  authDomain: "golden-chicken-c1637.firebaseapp.com",
  databaseURL: "https://golden-chicken-c1637-default-rtdb.firebaseio.com",
  projectId: "golden-chicken-c1637"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function getDailyPrice(basePrice) {
  const today = new Date().getDate();
  return basePrice + (today % 10) * 2;
}

function renderProducts(data) {
  const container = document.getElementById("productContainer");
  container.innerHTML = "";

  Object.values(data).forEach(product => {
    const price = getDailyPrice(product.basePrice);

    container.innerHTML += `
      <div class="card">
        <h3>${product.name}</h3>
        <div class="price">₹${price}</div>
      </div>
    `;
  });
}

db.ref("products").on("value", snap => {
  if (snap.val()) renderProducts(snap.val());
});
</script>

</body>
</html>
